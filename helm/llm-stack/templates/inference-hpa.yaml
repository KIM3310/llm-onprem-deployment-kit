{{- if and .Values.inference.enabled .Values.inference.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "llm-stack.fullname" . }}-inference
  labels:
    {{- include "llm-stack.componentLabels" (dict "component" "inference" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "llm-stack.fullname" . }}-inference
  minReplicas: {{ .Values.inference.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.inference.autoscaling.maxReplicas }}
  metrics:
    - type: External
      external:
        metric:
          name: {{ .Values.inference.autoscaling.metricName }}
          selector:
            matchLabels:
              app.kubernetes.io/component: inference
              app.kubernetes.io/instance: {{ .Release.Name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.inference.autoscaling.targetAverageValue | quote }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
{{- end }}
