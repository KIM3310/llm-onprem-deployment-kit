{{- if .Values.networkPolicy.enabled -}}
# Default-deny all ingress in the release namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-stack.fullname" . }}-default-deny
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS egress to kube-dns
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-stack.fullname" . }}-allow-dns
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow gateway -> inference and vector-db
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-stack.fullname" . }}-gateway-to-backends
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - inference
          - vector-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
---
# Allow Prometheus / monitoring namespace to scrape
{{- if .Values.networkPolicy.allowedIngressNamespaces }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-stack.fullname" . }}-allow-monitoring
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
{{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
{{- end }}
{{- end }}
---
# Allow egress from otel collector to exporters (cluster-egress; refine in production)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-stack.fullname" . }}-otel-egress
  labels:
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
