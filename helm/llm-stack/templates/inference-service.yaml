{{- if .Values.inference.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-stack.fullname" . }}-inference
  labels:
    {{- include "llm-stack.componentLabels" (dict "component" "inference" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  type: {{ .Values.inference.service.type }}
  ports:
    - name: http
      port: {{ .Values.inference.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "llm-stack.componentSelectorLabels" (dict "component" "inference" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 4 }}
{{- end }}
