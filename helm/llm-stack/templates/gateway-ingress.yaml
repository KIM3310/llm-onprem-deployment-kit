{{- if and .Values.gateway.enabled .Values.gateway.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llm-stack.fullname" . }}-gateway
  labels:
    {{- include "llm-stack.componentLabels" (dict "component" "gateway" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  ingressClassName: {{ .Values.gateway.ingress.className }}
  {{- if .Values.gateway.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.gateway.ingress.hostname | quote }}
      secretName: {{ .Values.gateway.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.gateway.ingress.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llm-stack.fullname" . }}-gateway
                port:
                  name: https
{{- end }}
