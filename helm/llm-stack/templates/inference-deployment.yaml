{{- if .Values.inference.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-stack.fullname" . }}-inference
  labels:
    {{- include "llm-stack.componentLabels" (dict "component" "inference" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  replicas: {{ .Values.inference.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "llm-stack.componentSelectorLabels" (dict "component" "inference" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-stack.componentLabels" (dict "component" "inference" "Values" .Values "Chart" .Chart "Release" .Release) | nindent 8 }}
      annotations:
        checksum/config: {{ toJson .Values.inference | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "llm-stack.serviceAccountName" . }}
      {{- include "llm-stack.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.inference.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.inference.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.inference.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm
          image: {{ include "llm-stack.image" (dict "image" .Values.inference.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.inference.image.pullPolicy | default .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - "--host=0.0.0.0"
            - "--port=8000"
            {{- if .Values.inference.model.modelPath }}
            - "--model={{ .Values.inference.model.modelPath }}"
            {{- else }}
            - "--model={{ .Values.inference.model.name }}"
            {{- end }}
            - "--max-model-len={{ .Values.inference.model.maxModelLen }}"
            {{- if .Values.inference.model.quantization }}
            - "--quantization={{ .Values.inference.model.quantization }}"
            {{- end }}
            {{- range .Values.inference.args.extra }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.inference.env }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: {{ div .Values.inference.probes.startupSeconds 10 }}
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            {{- toYaml .Values.inference.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.inference.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.inference.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: shm
              mountPath: /dev/shm
            {{- if .Values.inference.modelVolume.enabled }}
            - name: model-cache
              mountPath: /models
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        {{- if .Values.inference.modelVolume.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.inference.modelVolume.claimName }}
        {{- end }}
{{- end }}
