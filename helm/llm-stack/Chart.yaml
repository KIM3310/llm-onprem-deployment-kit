apiVersion: v2
name: llm-stack
description: |
  Unified Helm chart for deploying an enterprise LLM application into a private
  or airgapped Kubernetes cluster. Packages vLLM inference, Qdrant vector DB,
  Traefik gateway with OPA policy sidecar, OpenTelemetry Collector, and External
  Secrets Operator wiring.
type: application
version: 0.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.28.0-0"
keywords:
  - llm
  - vllm
  - qdrant
  - traefik
  - opa
  - opentelemetry
  - airgap
  - private-cloud
home: https://github.com/KIM3310/llm-onprem-deployment-kit
sources:
  - https://github.com/KIM3310/llm-onprem-deployment-kit
maintainers:
