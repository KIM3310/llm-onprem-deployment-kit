name: terraform-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate.yml'

permissions:
  contents: read

jobs:
  fmt-and-validate:
    name: fmt + validate (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - terraform/modules/azure-aks
          - terraform/modules/aws-eks
          - terraform/modules/gcp-gke
          - terraform/modules/azure-aks/examples/basic
          - terraform/modules/aws-eks/examples/basic
          - terraform/modules/gcp-gke/examples/basic
          - terraform/examples/airgapped-enterprise
          - terraform/examples/dev-sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.module }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false -no-color
        working-directory: ${{ matrix.module }}

      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.module }}
